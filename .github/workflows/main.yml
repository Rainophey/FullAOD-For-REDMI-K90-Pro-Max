name: Package and Upload as Artifact

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Generate timestamp
        id: timestamp
        run: |
          # 格式：YYYYMMDD_HHMMSS，例如 20260414_143052
          echo "datetime=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT

      - name: Upload to CI
        uses: actions/upload-artifact@v6
        with:
          name: faod816_${{ steps.timestamp.outputs.datetime }}
          path: |
            customize.sh
            module.prop
            service.sh
            system.prop
            META-INF
            
